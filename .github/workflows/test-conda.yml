name: Lint/Test Conda
on: [push, pull_request]

jobs:
  test:
    name: (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        python-version: ["3.10"]
    steps:
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}

      - name: Conda info
        shell: bash -l {0}
        run: conda info

      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install pip
          pip install --upgrade setuptools
          pip install -r requirements.txt
      - name: Test with pytest
        shell: bash -l {0}
        run: |
          cd tests
          # Whole deterministic suite (SDK + agent). `live`-marked tests hit the
          # real broker API and are excluded from CI (run locally: pytest -m live).
          pytest -m "not live"

  # Real-time alert: Slack message on any CI failure.
  # Requires repo secret SLACK_WEBHOOK_URL. No-ops cleanly if unset.
  notify:
    name: Notify on failure
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Slack alert
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured — skipping alert."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TEXT=":red_circle: CI FAILED on *${GITHUB_REF_NAME}* (${GITHUB_REPOSITORY})\n${RUN_URL}"
          HTTP=$(curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"${TEXT}\"}" "$SLACK_WEBHOOK_URL" -o resp.txt -w "%{http_code}")
          echo "Slack HTTP ${HTTP}: $(cat resp.txt)"
          # Fail loudly if the alert didn't post — a silent alert is worse than none.
          if [ "${HTTP}" != "200" ]; then
            echo "::error::CI-failure Slack alert did not post (HTTP ${HTTP})."
            exit 1
          fi